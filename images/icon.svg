<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="VB6 Modernizr icon">
  <title>VB6 Modernizr icon (128 px master) — "The Gutter"</title>
  <!-- A VB6 code window with the add-in's features arriving: glossy line-number
       margin, dotted indentation guide, spell-check squiggle.
       Use at 48 px and above; icon-32.svg and icon-16.svg are pixel-hinted redraws. -->
  <defs>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000080"/><stop offset="1" stop-color="#1084d0"/>
    </linearGradient>
    <linearGradient id="aqua" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8be0ff"/>
      <stop offset=".48" stop-color="#39aef0"/>
      <stop offset=".52" stop-color="#0a7ad0"/>
      <stop offset="1" stop-color="#36b0f4"/>
    </linearGradient>
  </defs>

  <rect x="4" y="8" width="120" height="112" fill="#d4d0c8" stroke="#808080" stroke-width="3"/>
  <path d="M6.5,118 L6.5,10.5 L122,10.5" stroke="#ffffff" stroke-width="3" fill="none"/>
  <rect x="11" y="15" width="106" height="19" fill="url(#cap)"/>
  <rect x="17" y="21" width="30" height="6" fill="#ffffff" opacity=".92"/>
  <rect x="11" y="38" width="106" height="76" fill="#ffffff" stroke="#808080"/>

  <!-- glossy line-number gutter -->
  <rect x="11" y="38" width="24" height="76" fill="url(#aqua)"/>
  <rect x="13" y="40" width="4" height="72" fill="#ffffff" opacity=".35"/>
  <text x="24" y="52" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="11" fill="#ffffff">1</text>
  <text x="24" y="64" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="11" fill="#ffffff">2</text>
  <text x="24" y="76" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="11" fill="#ffffff">3</text>
  <text x="24" y="88" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="11" fill="#ffffff">4</text>
  <text x="24" y="100" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="11" fill="#ffffff">5</text>

  <!-- code lines: keyword blue, text, comment green -->
  <rect x="40" y="45" width="34" height="5" fill="#0000c8"/>
  <rect x="48" y="57" width="46" height="5" fill="#3a3a3a"/>
  <rect x="48" y="69" width="38" height="5" fill="#3a3a3a"/>
  <rect x="48" y="81" width="40" height="5" fill="#008000"/>
  <rect x="40" y="93" width="26" height="5" fill="#0000c8"/>

  <!-- indentation guide + squiggle -->
  <line x1="44.5" y1="55" x2="44.5" y2="91" stroke="#9aa0a6" stroke-dasharray="2 3"/>
  <path d="M48,66 q3,-3.5 6,0 t6,0 t6,0 t6,0 t6,0 t6,0 t6,0" fill="none" stroke="#e60000" stroke-width="1.8" stroke-linecap="round"/>
</svg>
